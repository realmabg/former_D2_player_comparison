<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D2 Player Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=20260703a" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuToggle" class="icon-button" type="button" aria-label="Open menu" aria-expanded="false">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <a class="brand" href="#leaderboard">
            <div class="brand-mark">~</div>
            <div class="brand-copy">
              <strong>D2 Player Dashboard</strong>
              <span>D2 → D1 Projections</span>
            </div>
          </a>
        </div>
        <div class="topbar-actions">
          <a class="ghost-button" href="#raw-stats">Raw Stats</a>
          <a class="ghost-button" href="#leaderboard">Projections</a>
          <button id="quickCompare" class="ghost-button" type="button">Historical Comps</button>
          <a class="ghost-button" href="#methodology">Methodology (In Progress)</a>
        </div>
      </header>

      <div id="navOverlay" class="nav-overlay" hidden></div>

      <div class="layout">
        <aside id="sidebar" class="sidebar" aria-label="Primary navigation">
          <div class="sidebar-head">
            <a class="brand" href="#leaderboard">
              <div class="brand-mark">~</div>
              <div class="brand-copy">
                <strong>D2 Player Dashboard</strong>
                <span>D2 → D1 Projections</span>
              </div>
            </a>
            <button id="menuClose" class="close-button" type="button" aria-label="Close menu">×</button>
          </div>

          <nav id="navList" class="nav-list">
            <a class="nav-link" data-route="raw-stats" href="#raw-stats"><span class="nav-icon">#</span><span>Raw Stats</span></a>
            <a class="nav-link" data-route="leaderboard" href="#leaderboard"><span class="nav-icon">⌘</span><span>Projections</span></a>
            <a class="nav-link" data-route="pathways" href="#pathways"><span class="nav-icon">⇄</span><span>Historical Comps</span></a>
            <a class="nav-link" data-route="methodology" href="#methodology"><span class="nav-icon">≡</span><span>Methodology (In Progress)</span></a>
            <a class="nav-link" data-route="recruiting-board" href="#recruiting-board"><span class="nav-icon">☆</span><span>Recruiting Board</span><span class="beta-chip">Beta</span></a>
          </nav>
        </aside>

        <main class="page">
          <div id="viewRoot"></div>
        </main>
      </div>
    </div>

    <script type="module" src="src/app.js?v=20260703a"></script>
  </body>
</html>
