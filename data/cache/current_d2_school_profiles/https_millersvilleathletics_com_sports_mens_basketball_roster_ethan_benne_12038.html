"Twitter":16,"Instagram":16,"Facebook":16,"YouTube":16,"Snapchat":16,"TikTok":16,"Cameo":16,"Twitch":16,"LinkedIn":16,"Shop":16},"2026-06-05T12:21:54.043",[792,824,850],{"id":793,"title":794,"firstName":795,"lastName":796,"image":797,"sport":801,"positionShort":-1,"call_to_action":-1,"bio":802,"twitter":803,"images":16,"displayFields":804,"latestBioId":793,"email":808,"phone":809,"url":16,"staffId":810,"socialMediaR":811,"custom1":823,"custom2":22,"custom3":22,"custom4":22},1981,"Head Coach","Casey","Stitzel",{"altText":798,"url":799,"absoluteUrl":800,"creditName":16,"mediaCaption":16,"title":798},"Casey Stitzel","/images/2022/8/3/Casey_HS.jpg","https://millersvilleathletics.com/images/2022/8/3/Casey_HS.jpg",{"id":182,"title":115,"shortDisplay":115,"shortName":201,"abbrev":200,"facebookPage":-1,"globalSportGender":159,"globalSportId":184,"globalSportShortName":-1,"globalSportNameSlug":202,"instagramName":-1,"nonSport":-1,"pinterestName":-1,"ticketsLink":16,"twitterName":-1,"youtubeName":-1,"rosterId":16,"scheduleId":16,"displayOpponentHistory":-1},"Casey Stitzel, the 2022 PSAC East Coach of the Year, took over the Millersville men's basketball program in 2016, and in nine seasons, he has returned Millersville to the top of the PSAC East and perennial postseason fixtures.\u003Cbr />\r\n\u003Cbr />\r\nSince his arrival, Stitzel has led the Marauders to eight straight PSAC Tournament appearances, and in 2022, his team won the program's first PSAC East title in 16 years while reaching the tournament championship game and qualifying for the NCAA Tournament for the first time since 2008. Stitzel's Marauders have won three PSAC East titles and earned two NCAA Tournament berths since 2022. \u003Cbr />\r\n\u003Cbr />\r\nFrom 2019-2026, 18 of Stitzel's players earned All-PSAC East recognition. The four honorees in 2022 tied a program record. That same season, Caden Najdawi became the second Marauder to win the PSAC East Defensive Athlete of the Year award. In 2024-25, Stitzel's center, Drew Stover, became the first Marauder since 2008 to win the PSAC East Athlete of the Year award. In 2025-26, Millersville swept the PSAC East's top awards as Day Waters gave Millersville back-to-back PSAC East Athlete of the Year award winners, and Aamir Hurst was named the PSAc East Defensive Athlete of the Year. \u003Cbr />\r\n\u003Cbr />\r\nStitzel's impact was immediate as he generated a five-win improvement from the previous season in year one and reached the PSAC Tournament for the first time in three years in his second season. Those seasons included back-to-back wins over nationally ranked Shippensburg. In year three, Millersville won 16 games and hosted a PSAC Tournament game for the first time since 2015 despite having more minutes played by freshmen than any other team in the PSAC. That season, Jaden Faulkner became the first Marauder freshman in 15 years to be named All-PSAC East. In 2019-20, the Marauders were maligned with injuries but they still managed to finish fourth in the PSAC East and win a playoff game. The Marauders were the only team in the PSAC with three players named all-division. In 2022, his first recruiting class won 25 games and made a memorable run to the PSAC title game. He has also coached Millersville to back-to-back seasons with 18 or more wins for the first time in 15 years. In 2023-24, the Marauders won the PSAC East again, won five games against the region's top-10 and scored three wins over nationally ranked foes. From 2022-25, Millersville was the only team in the PSAC to play in the PSAC Semifinals three times, and he's produced five consecutive seasons with at least 18 victories, which is the program's longest such streak in 30 years. \u003Cbr />\r\n\u003Cbr />\r\nNot only did he improve the Marauders on the court, he also did so in the classroom. In his first semester on the job, the program posted its best GPA in more than a decade. Among his academic standouts was James Sullivan, who was twice named CoSIDA Academic All-District 2 and earned a prestigious PSAC Top 10 Award.\u003Cbr />\r\n\u003Cbr />\r\nStitzel has recruited and developed 13 1,000-point scorers in nine seasons. \u003Cbr />\r\n\u003Cbr />\r\nA two-time MAC Freedom Coach of the Year, Stitzel spent the previous eight seasons as the head coach at Delaware Valley University.  The winningest coach in Delaware Valley history, Stitzel inherited a program that had reached its conference tournament just once in the previous 41 seasons and had only two winning records in the 36 seasons prior to his arrival. Stitzel's impact on the program was remarkable and immediate. A 13-13 record in 2008-09 was the program's first .500 mark in more than a decade. In year three, Stitzel guided his team to a 17-11 record and the school's first-ever MAC Freedom Championship. DelVal had never before won a postseason game.\u003Cbr />\r\n \u003Cbr />\r\nStitzel won a second MAC Freedom Tournament in 2013 with a 19-9 record. His third league crown in eight seasons came in 2016 while posting a program record 20 wins. Along with those three conference championships came three NCAA Tournament appearances.\u003Cbr />\r\n \u003Cbr />\r\nStitzel holds deep ties to Millersville University. His father, Glenn Stitzel, was a 1,000-point scorer on the hardwood and star on the baseball diamond from 1965-68. Glenn, who still holds the school record for most points scored in a game (58),  went on to play eight years in the minor leagues and was inducted into the Millersville University Athletic Hall of Fame in 2002.\u003Cbr />\r\n  \u003Cbr />\r\nStitzel was mentored by some of the top coaches in the country, starting with his high school coach at Lansdale Catholic, Chris Mooney, who is now the head coach at the University of Richmond. After a standout high school career, Stitzel played under Dave Duda at Widener from 2001-05, scoring 1,189 points and earning All-Commonwealth Conference honors in 2003. His coaching career began under Naismith Memorial Basketball Hall of Fame coach Herb Magee at Philadelphia University. In two seasons under Magee, Stitzel helped the Rams to a 41-20 record with a NCAA Tournament berth and back-to-back Division II players of the year.\u003Cbr />\r\n  \u003Cbr />\r\nStitzel built Delaware Valley through an infusion of talent which came from hard work on the recruiting trail. In eight seasons, Stitzel developed 11 all-conference players and three MAC Freedom players of the year. Under Stitzel, Delaware Valley won in a variety of ways. In 2015-16, Stitzel's club led the league in scoring defense and field goal percentage defense. Two seasons before, his team led the league in scoring offense.\u003Cbr />\r\n \r\n\u003Ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" height=\"550\" width=\"500\">\r\n\t\u003Ctbody>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd colspan=\"8\" style=\"background-color: rgb(0, 0, 0); border-color: rgb(0, 0, 0);\">\u003Cspan style=\"color:#ffffff;\">\u003Cstrong>DELAWARE VALLEY\u003C/strong>\u003C/span>\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 204, 0);\">\u003Cstrong>Year\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 204, 0);\">\u003Cstrong>Overall\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 204, 0);\">\u003Cstrong>Conf. \u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 204, 0);\">\u003Cstrong>Finish\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd colspan=\"4\" rowspan=\"1\" style=\"text-align: center; background-color: rgb(255, 204, 0);\">\u003Cstrong>Postseason\u003C/strong>\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(204, 204, 204);\">2008-09\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(204, 204, 204);\">13-13\u003C/td>\r\n\t\t\t\u003Ctd sty \">T-1st\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 255, 255);\">PSAC Quarterfinals\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 255, 255);\">\u003Cstrong>Totals\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 255, 255);\">\u003Cstrong>272-206\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 255, 255);\">\u003Cstrong>178-129\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 255, 255);\">\u003C/td>\r\n\t\t\t\u003Ctd style=\"text-align: center; background-color: rgb(255, 255, 255);\">\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\u003C/tbody>\r\n\u003C/table>\r\n","CoachStitz",{"staff_title":805,"staff_email":806,"staff_phone":807,"staff_twitter":-1},"Title","Email","Phone","cstitzel@millersville.edu","717-871-4147",257,[812,814,815,816,817,818,819,820,821,822],{"platformName":429,"userName":803,"url":813,"icon":427,"oldIcon":428},"https://twitter.com/CoachStitz",{"platformName":433,"userName":16,"url":16,"icon":431,"oldIcon":432},{"platformName":438,"userName":16,"url":16,"icon":436,"oldIcon":437},{"platformName":442,"userName":16,"url":16,"icon":440,"oldIcon":441},{"platformName":446,"userName":16,"url":16,"icon":444,"oldIcon":445},{"platformName":450,"userName":16,"url":16,"icon":448,"oldIcon":449},{"platformName":454,"userName":16,"url":16,"icon":452,"oldIcon":453},{"platformName":458,"userName":16,"url":16,"icon":456,"oldIcon":457},{"platformName":462,"userName":16,"url":16,"icon":460,"oldIcon":461},{"platformName":466,"userName":16,"url":16,"icon":464,"oldIcon":465},"Widener '05",{"id":825,"title":826,"firstName":827,"lastName":828,"image":829,"sport":833,"positionShort":-1,"call_to_action":-1,"bio":834,"twitter":22,"images":16,"displayFields":835,"latestBioId":825,"email":836,"phone":837,"url":16,"staffId":838,"socialMediaR":839,"custom1":22,"custom2":22,"custom3":22,"custom4":22},1983,"Assistant Coach","Dexter","Harris",{"altText":830,"url":831,"absoluteUrl":832,"creditName":16,"mediaCaption":16,"title":830},"Dexter Harris","/images/2023/11/1/Dexter_Harris_1.jpg","https://millersvilleathletics.com/images/2023/11/1/Dexter_Harris_1.jpg",{"id":182,"title":115,"shortDisplay":115,"shortName":201,"abbrev":200,"facebookPage":-1,"globalSportGender":159,"globalSportId":184,"globalSportShortName":-1,"globalSportNameSlug":202,"instagramName":-1,"nonSport":-1,"pinterestName":-1,"ticketsLink":16,"twitterName":-1,"youtubeName":-1,"rosterId":16,"scheduleId":16,"displayOpponentHistory":-1},"Dexter Harris returned to Millersville as Casey Stitzel's top assistant prior to the 2025-26 season.\u003Cbr />\r\n\u003Cbr />\r\nThis is Harris' second stint at Millersville, as he served three seasons as an assistant coach before becoming the head coach at Wilson College. In his one season at Wilson, Harris helped two players earned All-United East honors, and he guided the Phoenix to the United East Tournament quarterfinals.\u003Cbr />\r\n\u003Cbr />\r\nIn his four seasons at Millersville, Harris helped the Marauders to two NCAA Tournament appearances, three PSAC East titles, a PSAC Championship game appearance in 2022 and a combined 87-34 record. Eleven Marauders earned All-PSAC East honors in those four seasons. \u003Cbr />\r\n\u003Cbr />\r\nA 2016 graduate of Chestnut Hill, Harris arrived at Millersville following a stint at Widener, where he helped the program to three postseason appearances in his time on the staff, serving four years as the top assistant. The team posted an 18-win season and ECAC Division III Championship in 2018. The program finished no lower than third in the standings over those four seasons. He helped the team to a 19-win season in 2019-20. In the classroom, he helped the team post a GPA of 3.0 higher all five years. \u003Cbr />\r\n\u003Cbr />\r\nWith Widener, he served as the lead recruiter in New Jersey, Southeastern Pennsylvania, Delaware, Maryland, Washington, D.C., and Virginia. Among the players Harris helped develop were three 1,000-point scorers and nine All-MAC Commonwealth honorees, including Connor Laverty, who was named the league's player of the year and an all-region selection in 2019-20. \u003Cbr />\r\n\u003Cbr />\r\nPrior to joining the coaching ranks, Harris spent four years as part of the Chestnut Hill basketball program. He played 43 games in his first two seasons, but his career was ended when he was diagnosed with deep vein thrombosis (DVT). He remained a part of the program and even served as a team captain. It proved to be his first exposure to coaching as he served as player coach from the sidelines. He was once the recipient of the Philadelphia-Area Small College Coaches’ Association (PASSCA) Sam Cozen Player of the Week award, which is presented to players who “embody the spirit” of small college basketball.\u003Cbr />\r\n\u003Cbr />\r\nHarris' bachelor's degree is in psychology with a minor in Spanish.\u003Cbr />\r\n ",{"staff_title":805,"staff_email":806,"staff_phone":807,"staff_twitter":-1},"dexter.harris@millersville.edu","717-871-5047",403,[840,841,842,843,844,845,846,847,848,849],{"platformName":429,"userName":16,"url":16,"icon":427,"oldIcon":428},{"platformName":433,"userName":16,"url":16,"icon":431,"oldIcon":432},{"platformName":438,"userName":16,"url":16,"icon":436,"oldIcon":437},{"platformName":442,"userName":16,"url":16,"icon":440,"oldIcon":441},{"platformName":446,"userName":16,"url":16,"icon":444,"oldIcon":445},{"platformName":450,"userName":16,"url":16,"icon":448,"oldIcon":449},{"platformName":454,"userName":16,"url":16,"icon":452,"oldIcon":453},{"platformName":458,"userName":16,"url":16,"icon":456,"oldIcon":457},{"platformName":462,"userName":16,"url":16,"icon":460,"oldIcon":461},{"platformName":466,"userName":16,"url":16,"icon":464,"oldIcon":465},{"id":851,"title":826,"firstName":852,"lastName":853,"image":854,"sport":855,"positionShort":-1,"call_to_action":-1,"bio":856,"twitter":22,"images":16,"displayFields":857,"latestBioId":851,"email":858,"phone":837,"url":16,"staffId":859,"socialMediaR":860,"custom1":22,"custom2":22,"custom3":22,"custom4":22},1982,"Kyle","McGee",{"altText":-1,"url":-1,"absoluteUrl":-1,"creditName":16,"mediaCaption":16,"title":-1},{"id":182,"title":115,"shortDisplay":115,"shortName":201,"abbrev":200,"facebookPage":-1,"globalSportGender":159,"globalSportId":184,"globalSportShortName":-1,"globalSportNameSlug":202,"instagramName":-1,"nonSport":-1,"pinterestName":-1,"ticketsLink":16,"twitterName":-1,"youtubeName":-1,"rosterId":16,"scheduleId":16,"displayOpponentHistory":-1},"Kyle McGee joined Coach Casey Stitzel's coaching staff as an assistant coach prior to the 2024-25 season. McGee came to Millersville after three seasons as an assistant coach at Elizabethtown University. \u003Cbr />\r\n\u003Cbr />\r\nIn his two seasons with the Marauders, McGee has helped the team to 39 wins and a PSAC East title in 2025-26. \u003Cbr />\r\n\u003Cbr />\r\nMcGee helped the Blue Jays to their most wins as a member of the Landmark Conference in 2024 and developed a pair of All-Landmark selections. He was part of a high-achieving academic program, which earned NABC Team of Academic Excellence recognition in 2022 and 2023. For Elizabethtown, McGee successfully recruited players from Pennsylvania, New Jersey, Maryland and South Carolina. \u003Cbr />\r\n\u003Cbr />\r\nBefore returning to Elizabethtown, McGee coached two seasons at Lycoming College while also serving as the junior varsity and associate boys' head coach at Shamokin Area High School. \u003Cbr />\r\n\u003Cbr />\r\nMcGee's collegiate playing career began at Centenary University, and he also played two seasons at Elizabethtown. After his collegiate career, McGee played with the American Basketball Association's Scranton Shamrocks from 2017-20. \u003Cbr />\r\n\u003Cbr />\r\nMcGee graduated from King's Co
