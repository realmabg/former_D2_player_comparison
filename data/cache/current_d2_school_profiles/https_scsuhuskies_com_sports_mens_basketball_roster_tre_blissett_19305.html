tats </span><!----></li><li id="v-0-4-3-2-1-1-2" role="option" class="s-select__option-item s-text-regular cursor-pointer py-[4px] px-[24px]" tabindex="-1" aria-selected="false"><!----><span> Media </span><!----></li><!--]--></ul></div></div><!----></div></div></div><div class="s-tab-panels pt-[36px] pt-[36px]"><div class="s-tab-item s-tab-item--selected" data-test-id="s-tab-item__root" role="tabpanel" aria-expanded="true" value="bio"><!--[--><div><div class="legacy_to_nextgen s-text-paragraph-longform sidearm_prose text-theme-safe overflow-auto"><strong>Career Notes<br />
<br />
2025-26 | Redshirt Freshman: </strong>Appeared in nine games playing 4.3 minutes per game...averaged 1.8 points while shooting 33.3% from the field and 66.7% from three...had a career game against Martin Luther on January 4 where he produced 10 points, five rebounds, and four steals, all of which were career-highs<br />
<br />
<strong>2024-25 | Redshirt:</strong> Did not appear in any games<br />
<br />
<strong>Prep: </strong>A 2024 graduate of Waubonsie Valley High School...averaged 13 points, four rebounds, and 2.5 assists his senior year...earned a plethora of accolades his senior year including Illinois Hoop Prospects All state defensive second team, Chicago Sun-Times All-Area boys basketball team, Unanimous DVC All-Conference,Ken Peddy Windmill City Classic MVP,Ken Peddy Windmill City Classic All-Tournament team, Aurora-Elgin boys basketball All-Area team, and Hinkle Holiday classic All-Tournament team...helped lead Waubonsie to the second most wins in school history during the 23-24 season with 27 wins...helped lead Waubonsie to the longest win streak in school history with 23 straight wins during the 23-24 season... 2023-24 Regional title... 2023-24 DVC Conference Championship with a 9-1 Record... off the court he was a mentor in a black mentorship program, Warrior Connection, as a junior and senior in high school.<br />
<br />
<strong>Personal:</strong> Son of Tiffany and Shawn Blissett...four siblings, Teshaun, Kelli, Dershawn, and Tristan...Business Economics major at SCSU...enjoys cooking food and spending time with family and friends...</div><!----><div class="mt-8 grid place-content-center"><div class="s-advert sidearm-ad-state flex flex-row justify-center" aria-label="Interactive Ad" role="group" data-test-id="s-advert__root"><a href="#" class="s-advert__skip-link sidearm-skip-link" data-test-id="s-advert__skip-ad-link">Skip Ad</a><div class="htlad-common-bottom"></div></div></div></div><!--]--></div><!----><!----></div></div></div><div class="s-videos-module s-videos-module--theme-light-theme s-videos-module--wrapper s-videos-module__template-mobile--top s-videos-module__template-tablet--top s-videos-module__template-desktop-full--top s-videos-module__template-desktop-rail--left s-videos-module__template-desktop-no-rail--top lg:shadow-level-1 min-h-[203vw] sm:min-h-[56vw] md:min-h-[43vw] lg:min-h-[37vw] xl:min-h-[478px] !border-theme-border-light my-4 !border !border-solid print:hidden" data-test-id="sng-videos__root" data-v-576b3c55><div class="s-videos-module__wrapper" data-v-576b3c55><div class="s-videos-module__heading" data-v-576b3c55><div data-test-id="s-heading__root" class="s-heading inline-flex flex-col s-heading--theme-light-theme s-heading--size-regular s-heading--device-desktop s-heading--border-position-under s-heading--border-sponsor-call-to-action w-full" innerbackground="false" data-v-576b3c55><div class="s-heading-inner inline-flex flex-wrap items-center justify-start border-b"><h3 name="h3" class="s-heading__main-text inline-flex items-center text-left s-text-heading self-end border-b-[4px] pb-[8px]"><!----><!----><div class="s-list-item__left-slot"><!--[--><!--]--></div> Related Videos</h3><div class="s-heading__sponsored-by-wrapper flex items-center ml-[16px]"><!--[--><div class="s-advert sidearm-ad-state flex flex-row justify-center" aria-label="Interactive Ad" "Philippe","Melbourne, Australia","Padua College","Psychology",{"Twitter":16,"Instagram":16,"Facebook":16,"YouTube":16,"Snapchat":16,"TikTok":16,"Cameo":16,"Twitch":16,"LinkedIn":16,"Shop":16},[872,873,874,875,876,877,878,879,880,881],{"platformName":465,"userName":16,"url":16,"icon":466,"oldIcon":467},{"platformName":469,"userName":16,"url":16,"icon":470,"oldIcon":471},{"platformName":473,"userName":16,"url":16,"icon":474,"oldIcon":475},{"platformName":477,"userName":16,"url":16,"icon":478,"oldIcon":479},{"platformName":481,"userName":16,"url":16,"icon":482,"oldIcon":483},{"platformName":485,"userName":16,"url":16,"icon":486,"oldIcon":487},{"platformName":489,"userName":16,"url":16,"icon":490,"oldIcon":491},{"platformName":493,"userName":16,"url":16,"icon":494,"oldIcon":495},{"platformName":497,"userName":16,"url":16,"icon":498,"oldIcon":499},{"platformName":501,"userName":16,"url":16,"icon":502,"oldIcon":503},"44",{"mediaCaption":16,"url":884,"absoluteUrl":885,"altText":886,"title":16,"creditName":16},"/images/2025/9/16/philippe_2526.jpg","https://scsuhuskies.com/images/2025/9/16/philippe_2526.jpg","Kynan Philippe",{"abbrev":222,"shortDisplay":452,"shortName":224,"globalSportId":198,"globalSportNameSlug":225,"globalSportGender":168,"id":226,"title":115},"2026-04-06T14:03:26.217",[890,920,947,971,996,1019],{"bio":891,"twitter":22,"image":892,"images":16,"displayFields":896,"sport":900,"latestCoachBioId":901,"latestSupportBioId":16,"latestBioId":901,"id":901,"title":902,"firstName":903,"lastName":904,"email":905,"phone":906,"url":16,"staffId":907,"socialMediaR":908,"custom1":919,"custom2":22,"custom3":22,"custom4":22},"Quincy Henderson enters his fifth season as the head coach of St. Cloud State Men’s Basketball in 2026-27. A two-time NCAA Champion as a player, Henderson has coached his teams to one NCAA Final, three Final Four appearances, four Elite Eight appearances, seven Sweet 16 appearances, nine NCAA Tournament appearances and 11 conference championships over his 14-year collegiate coaching career. Henderson owns a 68-54 (.557) record as a head coach with a 50-38 (.568) record in conference play.\u003Cbr />\r\n \u003Cbr />\r\nHenderson has recruited and coached eight All-Americans, two Region Players of the Year, 14 All-Region honorees, three Conference Players of the Year, three Conference Freshmen of the Year, 36 All-Conference selections, one Conference Defensive Player of the Year, and eight Conference All-Defensive Team members over his collegiate coaching career.\u003Cbr />\r\n\u003Cbr />\r\nFollowing up a great 2024-25 season, 2025-26 saw a historic season for St. Cloud State. Producing the second most wins in program history with a 26-7 record, the Huskies won the Regular Season NSIC Championship following a 20-2 mark in league play. This was the first conference championship for St. Cloud State since 2003. SCSU was one of the best defenses in Division II as they led the NSIC in points per game (65.8), opponent field goal percentage (39.9), opponent three-point percentage (27.6), rebounds per game (40.2), defensive rebounds per game (27.8), rebounding margin (+4.1), and scoring margin (+10.7). Night in and night out, St. Cloud State competed relentlessly with toughness, grit, and hustle.The Huskies produced a perfect 13-0 mark at home which was the first time since 1987-88 where SCSU had gone undefeated at home in the regular season. An 18-game win streak, the longest since 1985-86, powered the Huskies to the NSIC Tournament Championship game. Henderson and the Huskies would earn an at-large bid to the NCAA Tournament as they went dancing for the first time since the 2018-19 season. St. Cloud State would earn the four-seed in the NCAA Tournament and come away with an 83-65 win over the five-seed Missouri Western to reach the second round. Henderson would be named NSIC Coach of the Year as Luke Winkel and Wyatt Hawks would both earn First Team All-NSIC and D2CCA Second Team All-Central Region. Winkel would also earn NABC All-Central District Second Team while Hawks would be tabbed NSIC Defensive Player of the Year. \u003Cbr />\r\n\u003Cbr />\r\nThe 2024-25 season saw Henderson and the Huskies take a leap with a 20-12 record and a 15-7 mark in conference play to finish tied for third in the NSIC. The Huskies solidified their placement in the conference by going 5-1 over the final six games with a pair of key ranked wins against No. 22 Minot State and No. 23 Winona State at home. Both the total wins and conference wins were the most since the 2018-19 season. Making a brand of physicality on both ends of the floor, St. Cloud State led the conference in free throw attempts with 17.1 and were second in turnovers forced per game with 13.3. Henderson guided the Huskies to their third consecutive postseason appearance and hosted their first postseason game at Halenbeck Hall since 2018-19. A 68-60 win against Bemidji State in the First Round of the NSIC Tournament would be the first postseason win for Henderson at St. Cloud State as the Huskies advanced to the Pentagon. Henderson would coach two All-Conference Honorees in Luke Winkel (First Team) and Nate Dahl (Second Team).\u003Cbr />\r\n \u003Cbr />\r\nTasked with rebuilding an overhauled program with just four returning rotation players, Henderson led St. Cloud State to an NSIC Tournament appearance with a 10-18 record and a 7-15 mark in conference play. The Huskies finished sixth in the North and earned a conference tournament berth with a late-season surge, winning three of their last four to clinch their postseason spot.\u003Cbr />\r\n \u003Cbr />\r\nIn a 2022-23 season focused on establishing brand new systems and developing a young roster, St. Cloud State took big steps forward on both ends of the floor. The Huskies held opponents to shoot 46.9%, their best field goal percentage defense in five years, and posted their best defensive rating in three years. SCSU’s opportunistic defense led the NSIC in turnovers forced per game at 13.0 while forcing turnovers on 16.0% of opponent possessions – the program’s best mark in six years.\u003Cbr />\r\n \u003Cbr />\r\nSt. Cloud State’s offense found a new identity under Henderson, transforming into a free-flowing, high-possession unit predicated on ball movement. The Huskies’ motion offense averaged the second-most assists per game in the NSIC at 14.9 and recorded their best assist total in four years. SCSU knocked down 9.2 three-pointers a game, second-best in the Northern Sun, and shot 76.6% from the free-throw line to land fifth. Henderson’s offense produced the program’s second-highest pace in the last six seasons, shining in transition.\u003Cbr />\r\n \u003Cbr />\r\nHenderson was hired as the 14\u003Csup>th\u003C/sup> head coach in program history on May 13, 2022.\u003Cbr />\r\n \u003Cbr />\r\nBefore his appointment at St. Cloud State, Henderson established himself as a rising star in the coaching world over an eight-year run as a lead assistant at NCAA DII power West Texas A&M. Henderson served under legendary coaches Tom Brown and Chris Gove in Canyon, joining his former Winona State coaches as the staff quickly rebuilt a last-place program into a consistent NCAA Tournament team. Spending his first three seasons with the Buffs as an assistant before being elevated to Associate Head Coach in 2017-18, Henderson was primarily responsible for leading the defense – elevating WTAMU’s unit to one of the most fearsome in the country.\u003Cbr />\r\n \u003Cbr />\r\nUnder Henderson’s direction across his eight seasons, West Texas A&M’s defense recorded a stellar 99.4 defensive rating while holding opponents to shoot just 43.9% from the floor and 32.8% from deep with a suffocating 49.5% effective field goal percentage. The Buffs defense played a key role in the team’s up-tempo style of play, forcing opponents into 16.1 turnovers per game and a flummoxing 19.1% turnover percentage. Henderson’s defense posted defensive rating marks below 100 in three of his final four seasons including a remarkable 91.7 rating in the Buffs’ 32-1 2019-20 campaign. Defending the three-point shot well was another trademark of the unit as WTAMU held opponents under 7.0 made threes a game in seven of Henderson’s eight seasons.\u003Cbr />\r\n \u003Cbr />\r\nOver his eight years with West Texas A&M, the Buffs went 210-50 (.808) with a 102-30 (.773) record in the challenging Lone Star Conference and earned six consecutive NCAA Tournament berths while appearing in one NCAA Final, two Final Fours and three Sweet Sixteens. The Buffs went 15-3 at the Lone Star Conference Tournament and enjoyed a 14-5 mark at the NCAA Tournament. Henderson recruited and coached seven All-Americans, two Region Players of the Year, 11 All-Region honorees, three Conference Players of the Year, three Conference Freshmen of the Year, 26 All-Conference selections and eight Conference All-Defensive Team members.\u003Cbr />\r\n \u003Cbr />\r\nHenderson began his collegiate coaching career at NCAA DIII Illinois Wesleyan in 2012-13, spending two seasons as the lead assistant under Ron Rose as the Titans went 50-11 (.820) and 25-3 (.893) in CCIW play. Illinois Wesleyan made a Sweet 16 appearance and one Final Four appearance in his two years on staff, going 27-5 in 2013-14 to record the program’s best single season win total since 1997.\u003Cbr />\r\n \u003Cbr />\r\nDuring his two seasons in Bloomington, the Titans owned a 115.8 offensive rating and a 97.8 defensive rating for an incredible 18.0 net rating. The IWU defense held opponents to just 65.5 points per game on 40.2% shooting and 31.3% from three with a 15.2% turnover percentage. Six student-athletes earned All-Conference honors while one was named an All-American.\u003Cbr />\r\n \u003Cbr />\r\nA two-time Defensive Player of the Year in the Southeast Australian Basketball League, Henderson played three seasons of professional basketball with the Kilsyth Cobras following his terrific collegiate career. Known as a hard-nosed gritty defender with the ability to guard multiple positions, Henderson led Kilsyth to playoff berths in each of his three seasons while winning a division title in 2010.\u003Cbr />\r\n \u003Cbr />\r\nThe 2023 Winona State Athletics Hall of Fame Inductee played his final three seasons of collegiate basketball with the Warriors, playing a critical role in one of the most impressive dynasties in DII hoops. Henderson was a three-year starter in Winona, leading the program to NCAA Championships in 2006 and 2008 in addition to a National Finals appearance in 2007. Averaging nine points and five rebounds over his career while providing his trademark rugged defense, Henderson guided Winona State to establish DII records for most consecutive wins (57) and wins in a season (38) in addition to winning three NSIC Regular Season and Tournament Championships. The Warriors went 105-6 during his three seasons as a starter.\u003Cbr />\r\n \u003Cbr />\r\nHenderson spent his first three seasons of college basketball at NCAA DI Creighton. The Bluejays won the Missouri Valley Conference Tournament in his first season with the program and advanced to the NCAA Tournament as a No. 6 seed. Earning a role as a lockdown defender off the bench as a redshirt freshman, Henderson helped Creighton secure a host bid in the 2004 NIT Tournament.\u003Cbr />\r\n \u003Cbr />\r\nA native of Madison, Wisconsin, Henderson was a 2002 graduate of La Follette High School where he was a two-sport standout in both basketball and volleyball. He closed his prep basketball career by leading the Lancers to the 2002 WIAA D1 State Championship with a win over Fond du Lac at the Kohl Center. The Associated Press First Team All-State honoree was named Big Eight Conference Player of the Year and Madison Capital Times Player of the Year after his breakout senior season that saw him average 15 points, seven rebounds, three blocks and two steals a game. He graduated as La Follette’s all-time leader in blocked shots with 155 over his prep career and earned two First Team All-Big Eight Conference honors. Henderson also led the Lancers to the WIAA State Volleyball Tournament during his high school career.\u003Cbr />\r\n \u003Cbr />\r\nHenderson earned his undergraduate degree in Business Administration from Winona State in 2007 and earned his master’s degree in Sport Management from Illinois State in 2014.\u003Cbr />\r\n\u003Cbr />\r\n\u003Cstrong>SCSU Records and Accomplishments\u003C/strong>\r\n\r\n\u003Cul>\r\n\t\u003Cli>2025-26 NSIC Coach of the Year\u003C/li>\r\n\t\u003Cli>2025-26 Regular Season NSIC Champions\u003C/li>\r\n\t\u003Cli>Four postseason appearances (four NSIC Tournament, one NCAA Tournament)\u003C/li>\r\n\t\u003Cli>Two D2CCA All-Region Players (two second team)\u003C/li>\r\n\t\u003Cli>One NABC All-District Player (second team)\u003C/li>\r\n\t\u003Cli>Four All-NSIC Players (three first team, one second team)\u003C/li>\r\n\t\u003Cli>One NSIC Defensive Player of the Year\u003C/li>\r\n\t\u003Cli>Two NSIC All-Tournament Players\u003C/li>\r\n\t\u003Cli>One NSIC Player of the Week\u003C/li>\r\n\t\u003Cli>13 Academic All-NSIC Honorees\u003C/li>\r\n\t\u003Cli>Eight CSC Academic All-District Honorees\u003C/li>\r\n\t\u003Cli>2023-24 NABC Team Academic Excellence Award\u003C/li>\r\n\t\u003Cli>2024-25 NABC Team Academic Excellence Award\u003C/li>\r\n\t\u003Cli>Five NABC Honors Court Honorees\u003C/li>\r\n\u003C/ul>\r\n\u003Cbr />\r\n\u003Cstrong>The Henderson File:\u003C/strong>\u003Cbr />\r\n \r\n\u003Ctable border=\"1\" cellpadding=\"1\" cellspacing=\"1\" style=\"width:500px;\">\r\n\t\u003Ctbody>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd>\u003Cstrong>Year\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 73px;\">\u003Cstrong>Overall\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 72px;\">\u003Cstrong>NSIC\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 148px;\">\u003Cstrong>Postseason (NSIC)\u003C/strong>\u003C/td>\r\n\t\t\t\u003Ctd>\u003Cstrong>NCAA\u003C/strong>\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd>2022-23\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 73px;\">10-18\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 72px;\">7-15\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 148px;\">0-1\u003C/td>\r\n\t\t\t\u003Ctd>-\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd>2023-24\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 73px;\">12-17\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 72px;\">8-14\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 148px;\">0-1\u003C/td>\r\n\t\t\t\u003Ctd>-\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd>2024-25\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 73px;\">20-12\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 72px;\">15-7\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 148px;\">1-1\u003C/td>\r\n\t\t\t\u003Ctd>\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd>2025-26\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 73px;\">26-7\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 72px;\">20-2\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 148px;\">2-1\u003C/td>\r\n\t\t\t\u003Ctd>1-1\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\t\u003Ctr>\r\n\t\t\t\u003Ctd>Total at SCSU\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 73px;\">68-54\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 72px;\">50-38\u003C/td>\r\n\t\t\t\u003Ctd style=\"width: 148px;\">3-3\u003C/td>\r\n\t\t\t\u003Ctd>1-1\u003C/td>\r\n\t\t\u003C/tr>\r\n\t\u003C/tbody>\r\n\u003C/table>\r\n\u003Cbr />\r\n\u003Cstrong>Win Milestones:\u003C/strong>\u003Cbr />\r\n50th Win- January 3, 2026 vs Minnesota State (75-67)\u003Cbr />\r\n\u003Cbr />\r\n ",{"mediaCaption":16,"url":893,"absoluteUrl":894,"altText":895,"title":895,"creditName":16},"/images/2022/5/18/webhenderson22.jpg","https://scsuhuskies.com/images/2022/5/18/webhenderson22.jpg","hendersonweb",{"staff_title":897,"staff_email":898,"staff_phone":899},"Title","Email","Phone",{"abbrev":222,"shortDisplay":452,"shortName":224,"globalSportId":198,"globalSportNameSlug":225,"globalSportGender":168,"id":226,"title":115},9318,"Head Coach","Quincy","Henderson","quincy.henderson@stcloudstate.edu","320-308-4253",5562,[909,910,911,912,913,914,915,916,917,918],{"platformName":465,"userName":16,"url":16,"icon":466,"oldIcon":467},{"platformName":469,"userName":16,"url":16,"icon":470,"oldIcon":471},{"platformName":473,"userName":16,"url":16,"icon":474,"oldIcon":475},{"platformName":477,"userName":16,"url":16,"icon":478,"oldIcon":479},{"platformName":481,"userName":16,"url":16,"icon":482,"oldIcon":483},{"platformName":485,"userName":16,"url":16,"icon":486,"oldIcon":487},{"platformName":489,"userName":16,"url":16,"icon":490,"oldIcon":491},{"platformName":493,"userName":16,"url":16,"icon":494,"oldIcon":495},{"platformName":497,"userName":16,"url":16,"icon":498,"oldIcon":499},{"platformName":501,"userName":16,"url":16,"icon":502,"oldIcon":503},"HAH 330",{"bio":921,"twitter":22,"image":922,"images":16,"displayFields":926,"sport":927,"latestCoachBioId":928,"latestSupportBioId":16,"latestBioId":928,"id":928,"title":929,"firstName":930,"lastName":931,"email":932,"phone":933,"url":16,"staffId":934,"socialMediaR":935,"custom1":946,"custom2":22,"custom3":22,"custom4":22},"\u003Cp>Connor O’Brien enters his fifth season as the lead assistant of St. Cloud State Men’s Basketball in 2026-27. In addition to serving as the top assistant on Quincy Henderson’s coaching staff, O’Brien works closely with the Huskies’ frontcourt in all areas of player development. Through nine campaigns as an assistant coach at the collegiate level, O’Brien’s teams have earned a Sweet 16 appearance, five NCAA Tournament appearances and seven Conference Championships.\u003Cbr />\r\n \u003Cbr />\r\nO’Brien has recruited and coached three Academic All-Americans, nine All-Region selections, one Conference Player of the Year, 26 All-Conference honorees, one Conference Defensive Player of the Year, and four Conference All-Defensive Team members over his collegiate coaching career.\u003Cbr />\r\n \u003Cbr />\r\nO’Brien was hired as St. Cloud State’s assistant coach on June 22, 2022.\u003Cbr />\r\n \u003Cbr />\r\nBefore his appointment at St. Cloud State, O’Brien spent seven seasons as the top assistant at NCAA DIII Saint John’s under head coach Pat McKenzie, helping guide the Johnnies to three MIAC Regular Season Championships, three MIAC Tournament Championships, four NCAA Tournament appearances and one NCAA Sweet 16 berth. O’Brien helped oversee four 20-win seasons in Collegeville as SJU went 137-37 (.787) with a 92-25 (.786) mark in the MIAC. His Johnnies were no stranger to postseason success, going 10-3 at the conference tournament in his time on staff. O'Brien was named as one of Under Armour's 30 Under 30 award winners during his tenure at Saint John's.\u003Cbr />\r\n \u003Cbr />\r\nServing a variety of roles as the lead assistant at Saint John’s, O’Brien recruited and coached six All-Region selections, one Conference Player of the Year, 22 All-Conference honorees and four Conference All-Defensive Team members throughout his time in Collegeville. Off the court, Johnnie student-athletes earned three Academic All-American honors and 21 MIAC All-Academic selections.\u003Cbr />\r\n \u003Cbr />\r\nSaint John’s offense flourished during O’Brien’s time on staff, posting a 120.4 offensive rating while shooting 51.0% from the floor and 40.2% from three. The Johnnies held a +6.2 rebounding margin over the seven-year stretch and shot better than 55% inside the arc in six of O’Brien’s seven seasons. Two forwards – Tyler Weiss and Zach Hanson – earned All-Region honors under his guidance while Jubie Alade was named MIAC Player of the Year in 2020.\u003Cbr />\r\n \u003Cbr />\r\nO’Brien was a standout four-year starter at Minnesota State-Mankato, graduating No. 22 on the Mavericks’ career scoring list with 1,216 points and second all-time in blocks with 157. The formidable rim protector led MSU to three NSIC Championships and three NCAA Tournament appearances while averaging 10 points, seven rebounds and just over a block per game on 51% shooting. O’Brien started 32 games as a redshirt freshman on the Mavericks’ 2010-11 NCAA Final Four team and guided the program to a record 30 wins his senior year.\u003Cbr />\r\n \u003Cbr />\r\nA native of New Prague, Minnesota, O’Brien was a 2009 graduate of New Prague High School.\u003Cbr />\r\n \u003Cbr />\r\nO’Brien earned his undergraduate degree from Minnesota State-Mankato in 2014 and added a master’s degree in 2015.\u003Cbr />\r\n\u003Cbr />\r\nConnor and his wife Jenna have one daughter, Kinsley, and a son, William.\u003C/p>\r\n",{"mediaCaption":16,"url":923,"absoluteUrl":924,"altText":925,"title":925,"creditName":16},"/images/2022/7/5/Connor_O_Brien_Headshot.jpg","https://scsuhuskies.com/images/2022/7/5/Connor_O_Brien_Headshot.jpg","Connor O'Brien Headshot",{"staff_title":897,"staff_email":898,"staff_phone":899},{"abbrev":222,"shortDisplay":452,"shortName":224,"globalSportId":198,"globalSportNameSlug":225,"globalSportGender":168,"id":226,"title":115},9319,"Assistant Coach","Connor","O'Brien","connor.obrien@stcloudstate.edu","320-308-3299",5566,[936,937,938,939,940,941,942,943,944,945],{"platformName":465,"userName":16,"url":16,"icon":466,"oldIcon":467},{"platformName":469,"userName":16,"url":16,"icon":470,"oldIcon":471},{"platformName":473,"userName":16,"url":16,"icon":474,"oldIcon":475},{"platformName":477,"userName":16,"url":16,"icon":478,"oldIcon":479},{"platformName":481,"userName":16,"url":16,"icon":482,"oldIcon":483},{"platformName":485,"userName":16,"url":16,"icon":486,"oldIcon":487},{"platformName":489,"userName":16,"url":16,"icon":490,"oldIcon":491},{"platformName":493,"userName":16,"url":16,"icon":494,"oldIcon":495},{"platformName":497,"userName":16,"url":16,"icon":498,"oldIcon":499},{"platformName":501,"userName":16,"url":16,"icon":502,"oldIcon":503},"HAH 333",{"bio":948,"twitter":22,"image":949,"images":16,"displayFields":953,"sport":954,"latestCoachBioId":955,"latestSupportBioId":16,"latestBioId":955,"id":955,"title":929,"firstName":956,"lastName":957,"email":958,"phone":22,"url":16,"staffId":959,"socialMediaR":960,"custom1":22,"custom2":22,"custom3":22,"custom4":22},"Omar Aguirre enters his fourth season as an assistant coach with St. Cloud State Men’s Basketball in 2025-26. A bright young mind in the player development realm, Aguirre works closely with the St. Cloud State backcourt.\u003Cbr />\r\n \u003Cbr />\r\nAguirre has recruited and coached one All-American, one Region Player of the Year, four All-Region honorees, one Conference Player of the Year, 11 All-Conference selections and two Conference All-Defensive Team members over his four-year collegiate coaching career.\u003Cbr />\r\n \u003Cbr />\r\nIn Aguirre’s first year on staff the Huskies held opponents to shoot 46.9%, their best field goal percentage defense in five years, and posted their best defensive rating in three years. SCSU’s opportunistic defense led the NSIC in turnovers forced per game at 13.0 while forcing turnovers on 16.0% of opponent possessions – the program’s best mark in six years. St. Cloud State’s motion offense averaged the second-most assists per game in the NSIC at 14.9 and recorded their best assist total in four years. SCSU knocked down 9.2 three-pointers a game, second-best in the Northern Sun, and shot 76.6% from the free-throw line to land fifth.\u003Cbr />\r\n \u003Cbr />\r\nNo stranger to working with head coach Quincy Henderson, Aguirre spent two seasons as a student assistant under Henderson at West Texas A&M in 2017-18 and 2018-19. The Buffs went an incredible 66-8 (.892) with a 32-4 (.889) mark in the rugged Lone Star Conference during Aguirre’s two seasons on staff while earning two Conference Tournament Championships, one NCAA Final Four appearance and one NCAA Elite Eight appearance.\u003Cbr />\r\n \u003Cbr />\r\nA native of Denver City, Texas, Aguirre was a 2015 graduate of Denver City High School where he was a two-time All-District selection in basketball.\u003Cbr />\r\n \u003Cbr />\r\nAguirre earned his undergraduate degree from West Texas A&M in 2019.\u003Cbr />\r\n ",{"mediaCaption":16,"url":950,"absoluteUrl":951,"altText":952,"title":952,"creditName":16},"/images/2022/8/25/Omar_Headshot_copy.jpg","https://scsuhuskies.com/images/2022/8/25/Omar_Headshot_copy.jpg","Omar Aguirre Headshot",{"staff_title":897,"staff_email":898,"staff_phone":899},{"abbrev":222,"shortDisplay":452,"shortName":224,"globalSportId":198,"globalSportNameSlug":225,"globalSportGender":168,"id":226,"title":115},9320,"Omar","Aguirre","omar.aguirre@stcloudstate.edu",5570,[961,962,963,964,965,966,967,968,969,970],{"platformName":465,"userName":16,"url":16,"icon":466,"oldIcon":467},{"platformName":469,"userName":16,"url":16,"icon":470,"oldIcon":471},{"platformName":473,"userName":16,"url":16,"icon":474,"oldIcon":475},{"platformName":477,"userName":16,"url":16,"icon":478,"oldIcon":479},{"platformName":481,"userName":16,"url":16,"icon":482,"oldIcon":483},{"platformName":485,"userName":16,"url":16,"icon":486,"oldIcon":487},{"platformName":489,"userName":16,"url":16,"icon":490,"oldIcon":491},{"platformName":493,"userName":16,"url":16,"icon":494,"oldIcon":495},{"platformName":497,"userName":16,"url":16,"icon":498,"oldIcon":499},{"platformName":501,"userName":16,"url":16,"icon":502,"oldIcon":503},{"bio":972,"twitter":22,"image":973,"images":16,"displayFields":977,"sport":979,"latestCoachBioId":980,"latestSupportBioId":16,"latestBioId":980,"id":980,"title":929,"firstName":981,"lastName":982,"email":983,"phone":22,"url":16,"staffId":984,"socialMediaR":985,"custom1":22,"custom2":22,"custom3":22,"custom4":22},"Sam Chase enters his fourth season as an assistant coach with St. Cloud State Men’s Basketball in 2026-27. Chase works closely with the guards in addition to serving an important role in player development.\u003Cbr />\r\n \u003Cbr />\r\nIn his young collegiate coaching career, Chase has recruited and coached four All-Region selections, two Conference Defensive Player of the Years and seven All-Conference honorees.\u003Cbr />\r\n \u003Cbr />\r\nChase made his collegiate coaching debut as an assistant at Macalester in 2022-23, guiding the Scots to a 15-11 (.577) record with an 11-9 (.550) mark in MIAC play. Macalester’s defense was one of the best in the league with Chase on staff, boasting the No. 3 scoring defense at 68.1 points allowed per game with the No. 2 field goal percentage defense (41.9%) and No. 2 three-point percentage defense (30.9%) across the MIAC. The Scots forced a league-leading 13.0 turnovers per game and held the second-best rebounding margin in the conference at +4.2. His work with the Scot guards was extremely impressive as All-Region junior Caleb Williams scored 21.5 points per game to rank third in the league while sophomore Coby Gold poured in 14.0 a night with both earning All-MIAC honors.\u003Cbr />\r\n \u003Cbr />\r\nIn addition to his time at Macalester, Chase spent three seasons as an assistant at Blaine High School and coached two seasons in the AAU circuit with D1 Minnesota Basketball.\u003Cbr />\r\n \u003Cbr />\r\nA native of Blaine, Minnesota, Chase was a graduate of Blaine High School where he captained the Bengals as a senior and led the program to the MSHSL State Tournament in 2009.\u003Cbr />\r\n \u003Cbr />\r\nChase earned his bachelor’s degree in Accounting from Minnesota Duluth in 2014 and completed his master’s in Sport Management with a specialization in High Performance Coaching from Florida in 2022.",{"mediaCaption":16,"url":974,"absoluteUrl":975,"altText":976,"title":976,"creditName":16},"/images/2023/9/11/coach_Chase_cropped.jpg","https://scsuhuskies.com/images/2023/9/11/coach_Chase_cropped.jpg","Sam Chase 23-24",{"staff_title":897,"staff_email":898,"staff_phone":899,"staff_twitter":465,"staff_custom_1":978},"Office",{"abbrev":222,"shortDisplay":452,"shortName":224,"globalSportId":198,"globalSportNameSlug":225,"globalSportGender":168,"id":226,"title":115},932
